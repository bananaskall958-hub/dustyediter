<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bro Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-950 text-white">

  <div class="flex h-screen flex-col">
    <!-- Top Bar -->
    <header class="h-14 bg-black flex items-center px-6 justify-between border-b border-gray-800">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold text-red-500">BroEditor</h1>
      </div>
      <button id="exportBtn" class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded-lg font-medium">
        Export Video
      </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- Left Sidebar -->
      <div class="w-64 bg-gray-900 border-r border-gray-800 p-4 space-y-4">
        <h2 class="text-lg font-semibold">Media</h2>
        <input type="file" id="videoUpload" accept="video/*" class="hidden">
        <button onclick="document.getElementById('videoUpload').click()" 
                class="w-full bg-gray-800 hover:bg-gray-700 py-8 rounded-2xl flex flex-col items-center gap-2">
          <span class="text-4xl">📹</span>
          <span>Upload Video</span>
        </button>

        <button id="addTextBtn" 
                class="w-full bg-gray-800 hover:bg-gray-700 py-6 rounded-2xl flex flex-col items-center gap-2">
          <span class="text-3xl">Aa</span>
          <span>Add Text</span>
        </button>
      </div>

      <!-- Preview Area -->
      <div class="flex-1 flex flex-col relative bg-black" id="previewContainer">
        <div class="flex-1 flex items-center justify-center p-8 relative" id="previewArea">
          <video id="mainVideo" class="max-h-full max-w-full rounded-2xl shadow-2xl" controls></video>
          
          <!-- Text Overlays will be added here -->
          <div id="overlayContainer" class="absolute top-0 left-0 w-full h-full pointer-events-none"></div>
        </div>

        <!-- Bottom Controls -->
        <div class="h-16 bg-gray-900 border-t border-gray-800 flex items-center px-6 gap-4">
          <button id="playPauseBtn" class="text-4xl w-12 h-12 flex items-center justify-center hover:bg-gray-800 rounded-full">▶</button>
          <input type="range" id="seekBar" class="flex-1 accent-red-500" value="0">
          <span id="timeDisplay" class="font-mono text-sm w-28">00:00 / 00:00</span>
        </div>
      </div>

      <!-- Right Sidebar - AI -->
      <div class="w-80 bg-gray-900 border-l border-gray-800 flex flex-col">
        <div class="p-4 border-b border-gray-800">
          <h2 class="text-lg font-semibold">🤖 Smart AI Assistant</h2>
        </div>
        <div id="aiChat" class="flex-1 p-4 overflow-y-auto text-sm space-y-3"></div>
        <div class="p-4 border-t border-gray-800">
          <input type="text" id="aiInput" class="w-full bg-gray-800 rounded-xl px-4 py-3 outline-none" 
                 placeholder="e.g. add text 'My Awesome Video'">
          <button id="aiSendBtn" class="mt-2 w-full bg-red-600 hover:bg-red-700 py-2 rounded-xl">Send</button>
        </div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="h-72 bg-gray-900 border-t border-gray-800 p-4">
      <div class="flex justify-between mb-2">
        <h2 class="text-lg font-semibold">Timeline</h2>
        <span id="durationDisplay" class="text-sm text-gray-400"></span>
      </div>
      <div id="timeline" class="h-40 bg-gray-950 border border-gray-700 rounded-2xl relative overflow-hidden cursor-pointer">
        <canvas id="timelineCanvas" class="w-full h-full"></canvas>
        <div id="trimStart" class="absolute top-0 bottom-0 w-1 bg-blue-500 cursor-ew-resize z-20"></div>
        <div id="trimEnd" class="absolute top-0 bottom-0 w-1 bg-blue-500 cursor-ew-resize z-20"></div>
        <div id="playhead" class="absolute top-0 bottom-0 w-0.5 bg-red-500 shadow-lg z-30"></div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
